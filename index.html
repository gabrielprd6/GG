<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révisions Philo — QCM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0d1a;--card:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--accent:#a78bfa;--accent-glow:rgba(167,139,250,.35);--green:#34d399;--red:#f87171;--text:#f1f0f5;--muted:#9b95a8;--font-h:'DM Serif Display',serif;--font-b:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:var(--bg);font-family:var(--font-b);color:var(--text);display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:700px;z-index:10}
.card{background:var(--card);border:1px solid var(--border);backdrop-filter:blur(20px);border-radius:28px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fadeIn .6s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hide{display:none!important}
h1{font-family:var(--font-h);font-size:2.6rem;text-align:center;background:linear-gradient(135deg,#a78bfa,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
h2{font-family:var(--font-h);font-size:1.6rem;color:var(--accent);margin-bottom:8px}
.subtitle{text-align:center;color:var(--muted);margin-bottom:32px;font-size:.95rem;line-height:1.6}
/* Theme cards */
.themes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.theme-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:20px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .35s cubic-bezier(.175,.885,.32,1.275)}
.theme-card:hover{background:rgba(167,139,250,.08);border-color:var(--accent);transform:translateY(-4px) scale(1.02);box-shadow:0 12px 30px var(--accent-glow)}
.theme-card .emoji{font-size:2.8rem;display:block;margin-bottom:10px}
.theme-card .name{font-weight:800;font-size:1.05rem;color:var(--text)}
.theme-card .count{font-size:.78rem;color:var(--muted);margin-top:4px}
/* Progress */
.progress-bar{display:flex;align-items:center;gap:12px;margin-bottom:28px;background:rgba(255,255,255,.02);border-radius:16px;padding:10px 16px;border:1px solid var(--border)}
.progress-label{font-size:.8rem;font-weight:700;color:var(--accent);white-space:nowrap}
.progress-track{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#7c3aed);border-radius:10px;transition:width .4s ease}
.score-label{font-size:.8rem;font-weight:700;color:var(--green);white-space:nowrap}
/* Question */
.q-emoji{font-size:2.4rem;text-align:center;display:block;margin-bottom:12px}
.q-text{font-size:1.2rem;font-weight:700;line-height:1.6;text-align:center;margin-bottom:28px;color:var(--text)}
.q-theme-tag{display:inline-block;background:rgba(167,139,250,.12);color:var(--accent);font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
/* Answer options */
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.option-btn{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 20px;font-family:var(--font-b);font-size:.95rem;font-weight:600;color:var(--text);cursor:pointer;text-align:left;transition:all .25s ease;line-height:1.5}
.option-btn:hover:not(.disabled){background:rgba(167,139,250,.06);border-color:rgba(167,139,250,.3);transform:translateX(4px)}
.option-btn.correct{background:rgba(52,211,153,.1)!important;border-color:var(--green)!important;color:var(--green)!important;box-shadow:0 4px 16px rgba(52,211,153,.2)}
.option-btn.wrong{background:rgba(248,113,113,.08)!important;border-color:var(--red)!important;color:var(--red)!important}
.option-btn.disabled{cursor:default;opacity:.7}
.option-btn.disabled:hover{transform:none;background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1)}
.option-letter{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);font-weight:800;font-size:.82rem;margin-right:12px;flex-shrink:0;transition:all .25s}
.correct .option-letter{background:var(--green);color:white}
.wrong .option-letter{background:var(--red);color:white}
/* Explanation */
.explanation{background:rgba(167,139,250,.06);border-left:4px solid var(--accent);border-radius:0 16px 16px 0;padding:18px 20px;margin-bottom:24px;animation:slideDown .4s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.explanation .expl-title{font-weight:800;color:var(--accent);margin-bottom:8px;font-size:.88rem;text-transform:uppercase;letter-spacing:.5px}
.explanation .expl-text{color:var(--muted);font-size:.9rem;line-height:1.7}
.explanation .expl-text strong{color:var(--text)}
/* Buttons */
.btn{border:none;border-radius:50px;padding:15px 32px;font-family:var(--font-b);font-size:.98rem;font-weight:700;cursor:pointer;transition:all .3s cubic-bezier(.175,.885,.32,1.275);display:inline-flex;align-items:center;justify-content:center;text-decoration:none}
.btn-primary{background:var(--accent);color:white;box-shadow:0 8px 24px var(--accent-glow)}
.btn-primary:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 14px 32px var(--accent-glow)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:white}
.nav-row{display:flex;justify-content:flex-end;gap:12px}
/* Results */
.result-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;border:4px solid var(--accent);background:rgba(167,139,250,.06)}
.result-circle .big-score{font-size:2.4rem;font-weight:900;color:var(--accent)}
.result-circle .out-of{font-size:.85rem;color:var(--muted)}
.result-msg{text-align:center;font-size:1.1rem;color:var(--muted);margin-bottom:28px;line-height:1.6}
.result-details{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;max-height:300px;overflow-y:auto}
.result-item{display:flex;align-items:flex-start;gap:12px;background:rgba(255,255,255,.02);border-radius:14px;padding:12px 16px;font-size:.85rem}
.result-icon{font-size:1.1rem;flex-shrink:0;margin-top:2px}
.result-q{color:var(--muted);line-height:1.5}
.result-q strong{color:var(--text)}
.results-btns{display:flex;flex-direction:column;gap:10px;align-items:center}
.results-btns .btn{width:100%;max-width:340px}
@media(max-width:560px){
.card{padding:24px 16px;border-radius:22px}
h1{font-size:2rem}
.themes-grid{grid-template-columns:1fr 1fr;gap:10px}
.q-text{font-size:1.05rem}
}
</style>
</head>
<body>
<div class="container">

<!-- SCREEN: HOME -->
<div id="screen-home" class="card">
<h1>📚 Révisions Philo</h1>
<p class="subtitle">Prépare ton bac avec des QCM corrigés et expliqués.<br>Choisis un thème pour commencer !</p>
<div class="themes-grid">
  <div class="theme-card" onclick="startTheme('travail')">
    <span class="emoji">⚒️</span>
    <span class="name">Le Travail</span>
    <span class="count">10 questions</span>
  </div>
  <div class="theme-card" onclick="startTheme('temps')">
    <span class="emoji">⏳</span>
    <span class="name">Le Temps</span>
    <span class="count">10 questions</span>
  </div>
  <div class="theme-card" onclick="startTheme('nature')">
    <span class="emoji">🌿</span>
    <span class="name">La Nature</span>
    <span class="count">10 questions</span>
  </div>
</div>
<div style="text-align:center">
  <button class="btn btn-primary" onclick="startTheme('all')">🎲 Mélange des 3 thèmes (30 questions)</button>
</div>
</div>

<!-- SCREEN: QUIZ -->
<div id="screen-quiz" class="card hide">
<div class="progress-bar">
  <span class="progress-label" id="q-counter">1/10</span>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
  <span class="score-label" id="score-label">✅ 0</span>
</div>
<div id="q-theme-tag" class="q-theme-tag">Le Travail</div>
<p class="q-text" id="q-text">Chargement...</p>
<div class="options" id="options-container"></div>
<div id="explanation-box" class="explanation hide">
  <div class="expl-title">💡 Explication</div>
  <div class="expl-text" id="expl-text"></div>
</div>
<div class="nav-row">
  <button class="btn btn-primary hide" id="btn-next" onclick="nextQuestion()">Suivant ➡️</button>
</div>
</div>

<!-- SCREEN: RESULTS -->
<div id="screen-results" class="card hide">
<h1>Résultats</h1>
<div class="result-circle">
  <span class="big-score" id="r-score">0</span>
  <span class="out-of" id="r-total">/ 10</span>
</div>
<p class="result-msg" id="r-msg">Bien joué !</p>
<div class="result-details" id="r-details"></div>
<div class="results-btns">
  <button class="btn btn-primary" onclick="location.reload()">🏠 Retour aux thèmes</button>
</div>
</div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// QUESTIONS DATABASE
// ═══════════════════════════════════════════════════════════════
const QUESTIONS = {
travail: [
{q:"Pour Marx, qu'est-ce que l'aliénation du travail ?",opts:["Le fait de travailler trop longtemps","Le processus par lequel le travailleur devient étranger au produit de son travail","Le refus de travailler","La division du travail en tâches simples"],correct:1,expl:"Chez <strong>Marx</strong>, l'aliénation désigne le fait que dans le système capitaliste, le travailleur ne se reconnaît plus dans ce qu'il produit : l'objet de son travail lui est étranger, il ne lui appartient pas. Le travail devient alors une activité subie et non épanouissante. C'est un concept central des <em>Manuscrits de 1844</em>."},
{q:"Selon Hannah Arendt, quelle distinction fondamentale fait-elle concernant l'activité humaine ?",opts:["Travail manuel vs travail intellectuel","Travail, œuvre et action","Travail privé vs travail public","Travail salarié vs travail bénévole"],correct:1,expl:"Dans <strong><em>La Condition de l'homme moderne</em></strong>, Arendt distingue trois activités : le <strong>travail</strong> (labor) lié aux nécessités biologiques et cycliques, l'<strong>œuvre</strong> (work) qui fabrique des objets durables, et l'<strong>action</strong> (action) qui est l'activité politique par excellence. Cette tripartition est fondamentale pour comprendre la dignité humaine."},
{q:"Quel philosophe a dit que le travail est « l'essence de l'homme » ?",opts:["Nietzsche","Hegel","Aristote","Descartes"],correct:1,expl:"Pour <strong>Hegel</strong>, le travail est ce qui permet à l'homme de se réaliser et de transformer le monde. Dans la célèbre <strong>dialectique du maître et de l'esclave</strong> (<em>Phénoménologie de l'Esprit</em>), c'est l'esclave qui, par son travail, accède à la conscience de soi — tandis que le maître, oisif, stagne."},
{q:"Que signifie l'étymologie latine du mot « travail » (tripalium) ?",opts:["Un outil de mesure","Un instrument de torture à trois pieux","Un type de charrue romaine","Un contrat d'échange"],correct:1,expl:"Le mot <strong>travail</strong> vient du latin <strong><em>tripalium</em></strong>, un instrument de torture composé de trois pieux. Cette étymologie révèle que le travail a d'abord été perçu comme une <strong>souffrance</strong> et une <strong>contrainte</strong>, avant d'être valorisé positivement à l'époque moderne."},
{q:"Pour Aristote, pourquoi le travail manuel est-il dévalorisé ?",opts:["Parce qu'il est mal payé","Parce qu'il empêche de se consacrer à la vie contemplative et politique","Parce qu'il est dangereux","Parce qu'il est réservé aux femmes"],correct:1,expl:"<strong>Aristote</strong> considère que le travail manuel (activité des <em>banausos</em>) est indigne de l'homme libre car il enchaîne le corps et empêche la <strong>vie contemplative</strong> (<em>bios theoretikos</em>), qui est pour lui la forme la plus haute d'activité humaine. Seul le loisir (<em>scholè</em>) permet l'exercice de la pensée et de la citoyenneté."},
{q:"Que défend Paul Lafargue dans « Le Droit à la paresse » ?",opts:["Que le travail est un devoir sacré","Que les ouvriers doivent revendiquer le droit de ne travailler que trois heures par jour","Que la paresse est un vice moral","Que le progrès technique rend le travail plus agréable"],correct:1,expl:"<strong>Paul Lafargue</strong> (gendre de Marx) écrit en 1880 un pamphlet provocateur où il dénonce l'<strong>amour absurde du travail</strong> chez les prolétaires. Il défend l'idée que le progrès technique devrait permettre de <strong>réduire drastiquement le temps de travail</strong> pour que l'homme puisse enfin vivre, penser et profiter de la vie."},
{q:"Selon Simone Weil, qu'est-ce qui rend le travail ouvrier particulièrement aliénant ?",opts:["Le salaire insuffisant","La soumission au rythme de la machine et la perte d'attention","Le manque de congés payés","Les horaires de nuit"],correct:1,expl:"<strong>Simone Weil</strong>, qui a travaillé en usine pour comprendre la condition ouvrière (<em>La Condition ouvrière</em>, 1951), montre que le travail à la chaîne impose une <strong>soumission totale au rythme mécanique</strong>. L'ouvrier ne peut plus penser, l'attention est captée par des gestes répétitifs : c'est une forme de <strong>déshumanisation</strong>."},
{q:"Qu'est-ce que la « valeur travail » selon l'éthique protestante décrite par Max Weber ?",opts:["Le prix du travail sur le marché","L'idée que le travail est une vocation divine et un signe d'élection","Un indicateur économique","La quantité de travail contenue dans un produit"],correct:1,expl:"Dans <strong><em>L'Éthique protestante et l'esprit du capitalisme</em></strong>, <strong>Weber</strong> montre que le protestantisme (surtout le calvinisme) a valorisé le travail comme <strong>vocation</strong> (<em>Beruf</em>) et signe de l'élection divine. Cette éthique a contribué à l'essor du capitalisme en faisant du travail acharné une <strong>vertu morale</strong>."},
{q:"Que signifie la phrase de Nietzsche : « Le travail est la meilleure des polices » ?",opts:["Le travail protège la société du crime","Le travail discipline les individus et les empêche de penser librement","Le travail est encadré par des lois justes","Les policiers travaillent bien"],correct:1,expl:"Pour <strong>Nietzsche</strong> (<em>Aurore</em>, §173), le travail est un instrument de <strong>contrôle social</strong>. En occupant constamment l'individu, il l'empêche de <strong>réfléchir</strong>, de se révolter, de développer sa singularité. Le travail est ainsi une forme de <strong>domestication</strong> de l'être humain."},
{q:"Quel concept Durkheim associe-t-il à la division du travail social ?",opts:["L'exploitation","La solidarité organique","La lutte des classes","L'anomie uniquement"],correct:1,expl:"<strong>Durkheim</strong> montre dans <em>De la division du travail social</em> (1893) que la spécialisation des tâches crée une <strong>solidarité organique</strong> : chaque individu dépend des autres, comme les organes d'un corps. Cela s'oppose à la solidarité mécanique des sociétés traditionnelles, fondée sur la ressemblance."}
],
temps: [
{q:"Selon saint Augustin, quelle est la nature du temps ?",opts:["Une illusion créée par nos sens","Une réalité objective mesurable","Une expérience subjective de la conscience (distension de l'âme)","Un cycle éternel de retour"],correct:2,expl:"Dans les <strong><em>Confessions</em></strong> (livre XI), <strong>saint Augustin</strong> affirme : « Qu'est-ce que le temps ? Si personne ne me le demande, je le sais ; si je veux l'expliquer, je ne le sais plus. » Le temps est pour lui une <strong>distentio animi</strong> (distension de l'âme) : c'est la conscience qui, par la mémoire, l'attention et l'attente, crée l'expérience temporelle."},
{q:"Qu'est-ce que la « durée » chez Bergson ?",opts:["Le temps mesuré par les horloges","Le temps vécu par la conscience, qualitatif et indivisible","La durée de vie d'un organisme","Le temps cyclique des saisons"],correct:1,expl:"<strong>Bergson</strong> oppose le <strong>temps spatialisé</strong> (quantitatif, mesuré par les horloges) à la <strong>durée</strong> (<em>durée réelle</em>), qui est le temps tel qu'il est vécu par la conscience : <strong>continu, qualitatif, indivisible</strong>. Chaque instant est unique et s'interpénètre avec les autres. C'est le cœur de l'<em>Essai sur les données immédiates de la conscience</em>."},
{q:"Que signifie le concept d'« éternel retour » chez Nietzsche ?",opts:["L'histoire se répète toujours à l'identique","Il faut vivre chaque instant comme si on devait le revivre éternellement","Le temps est circulaire comme chez les Grecs","La mort n'existe pas"],correct:1,expl:"L'<strong>éternel retour</strong> chez <strong>Nietzsche</strong> est moins une thèse cosmologique qu'un <strong>test existentiel</strong> : « Voudrais-tu revivre cette vie exactement telle qu'elle fut, une infinité de fois ? » C'est une invitation à <strong>affirmer la vie</strong> dans sa totalité, y compris la souffrance. Celui qui dit « oui » incarne le <em>surhomme</em>."},
{q:"Pour Heidegger, quel rapport l'homme (Dasein) entretient-il avec le temps ?",opts:["L'homme est indifférent au temps","L'homme est un être temporel dont l'existence est orientée vers la mort","L'homme peut échapper au temps par la méditation","Le temps est une création humaine"],correct:1,expl:"Dans <strong><em>Être et Temps</em></strong>, <strong>Heidegger</strong> montre que le <strong>Dasein</strong> (l'être humain) est fondamentalement un <strong>être-pour-la-mort</strong>. La conscience de notre finitude donne au temps son caractère authentique et nous pousse à vivre de manière résolue. Le temps n'est pas extérieur à nous : nous <strong>sommes</strong> temporels."},
{q:"Qu'est-ce que l'angoisse du temps selon Pascal ?",opts:["La peur de vieillir","L'impossibilité de vivre le présent, toujours tourné vers le passé ou le futur","La crainte du jugement dernier","Le regret des erreurs passées"],correct:1,expl:"<strong>Pascal</strong> observe dans les <em>Pensées</em> que l'homme ne vit <strong>jamais dans le présent</strong> : « Nous ne vivons jamais, mais nous espérons de vivre. » Nous fuyons le présent par le <strong>divertissement</strong>, car rester face à soi-même nous confronte à notre misère et à notre mortalité. C'est une forme d'angoisse temporelle."},
{q:"Quel philosophe distingue le « temps vulgaire » du « temps originaire » ?",opts:["Kant","Heidegger","Platon","Sartre"],correct:1,expl:"<strong>Heidegger</strong> distingue le <strong>temps vulgaire</strong> (le temps des horloges, linéaire et mesurable, le temps du « On ») du <strong>temps originaire</strong> (la temporalité authentique du Dasein, orientée vers la mort et la résolution). Le temps vulgaire est une <strong>dégradation</strong> du temps originaire."},
{q:"Selon Épicure, pourquoi ne faut-il pas craindre la mort ?",opts:["Parce qu'il y a une vie après la mort","Parce que quand nous sommes, la mort n'est pas, et quand la mort est, nous ne sommes plus","Parce que la mort est un passage vers un monde meilleur","Parce que le temps est une illusion"],correct:1,expl:"<strong>Épicure</strong> écrit dans la <em>Lettre à Ménécée</em> : « La mort n'est rien pour nous. » Son argument est logique : la mort est <strong>absence de sensation</strong>. Tant que nous vivons, elle n'est pas là ; quand elle est là, nous ne sommes plus. Il n'y a donc <strong>aucun moment</strong> où nous coexistons avec la mort."},
{q:"Qu'est-ce que le « temps comme forme a priori de la sensibilité » chez Kant ?",opts:["Le temps est une propriété des choses en soi","Le temps est une structure de notre esprit qui conditionne toute expérience","Le temps est créé par Dieu","Le temps n'existe pas réellement"],correct:1,expl:"Pour <strong>Kant</strong> (<em>Critique de la raison pure</em>), le temps n'est pas une propriété objective du monde mais une <strong>forme a priori de la sensibilité</strong> : c'est notre esprit qui structure toute expérience dans le temps. Sans cette forme, aucune perception ne serait possible. Le temps est donc une condition <strong>subjective</strong> mais <strong>universelle</strong> de la connaissance."},
{q:"Que signifie le « Carpe Diem » d'Horace dans une perspective philosophique ?",opts:["Profite de chaque instant car le futur est incertain","Cueille des fleurs chaque jour","Vis sans penser au lendemain de manière irresponsable","Le temps est cyclique"],correct:0,expl:"Le <strong>Carpe Diem</strong> (« Cueille le jour ») d'<strong>Horace</strong> est une invitation à <strong>saisir le présent</strong> sans se laisser paralyser par l'incertitude du futur. C'est une sagesse pratique proche de l'<strong>épicurisme</strong> : plutôt que de se tourmenter pour ce qui viendra, il faut savourer l'instant présent avec mesure et gratitude."},
{q:"Pourquoi Proust dit-il que le temps est « perdu » puis « retrouvé » ?",opts:["Parce qu'il a perdu sa montre","Parce que la mémoire involontaire permet de revivre le passé dans sa vérité","Parce qu'on peut remonter le temps","Parce que le temps est une boucle"],correct:1,expl:"Dans <strong><em>À la recherche du temps perdu</em></strong>, <strong>Proust</strong> montre que le temps « perdu » (le passé oublié) peut être <strong>retrouvé</strong> par la <strong>mémoire involontaire</strong> : une madeleine, une odeur, un pavé inégal font ressurgir le passé dans toute sa richesse sensorielle. L'art et l'écriture deviennent alors le moyen de <strong>vaincre le temps</strong>."}
],
nature: [
{q:"Selon Rousseau, quel est l'état de l'homme dans l'état de nature ?",opts:["Un être violent et belliqueux","Un être bon, solitaire et guidé par la pitié naturelle","Un être rationnel et social","Un être soumis aux dieux"],correct:1,expl:"Dans le <strong><em>Discours sur l'origine de l'inégalité</em></strong>, <strong>Rousseau</strong> imagine l'homme à l'état de nature comme un être <strong>bon</strong>, <strong>solitaire</strong>, guidé par l'<strong>amour de soi</strong> (instinct de conservation) et la <strong>pitié</strong> (compassion naturelle). C'est la société qui le corrompt : « L'homme est né bon, c'est la société qui le déprave. »"},
{q:"Que signifie la formule de Hobbes : « L'homme est un loup pour l'homme » ?",opts:["Les hommes ressemblent physiquement aux loups","À l'état de nature, les hommes sont en guerre permanente les uns contre les autres","Les hommes doivent vivre en meute","Les loups sont des animaux domesticables"],correct:1,expl:"Pour <strong>Hobbes</strong> (<em>Léviathan</em>), l'état de nature est un état de <strong>guerre de tous contre tous</strong> (<em>bellum omnium contra omnes</em>). Sans État, chacun est une menace pour les autres. C'est pourquoi les hommes acceptent de renoncer à leur liberté naturelle pour se soumettre à un <strong>souverain absolu</strong> garant de la paix (le contrat social)."},
{q:"Quelle distinction la philosophie fait-elle entre « nature » et « culture » ?",opts:["La nature est belle, la culture est laide","La nature est ce qui est inné et universel, la culture est acquise et variable","La nature concerne les plantes, la culture les humains","Il n'y a pas de distinction"],correct:1,expl:"En philosophie, la <strong>nature</strong> désigne ce qui est <strong>inné, spontané et universel</strong> (commun à toute l'espèce), tandis que la <strong>culture</strong> désigne ce qui est <strong>acquis, construit et variable</strong> selon les sociétés. <strong>Lévi-Strauss</strong> propose comme critère la <strong>règle de l'interdit de l'inceste</strong> : universelle mais normative, elle marque le passage de la nature à la culture."},
{q:"Pour Descartes, quel rapport l'homme doit-il avoir avec la nature ?",opts:["L'homme doit vénérer la nature comme sacrée","L'homme doit se rendre « maître et possesseur de la nature »","L'homme doit vivre en harmonie avec la nature","L'homme est incapable de comprendre la nature"],correct:1,expl:"Dans le <strong><em>Discours de la méthode</em></strong>, <strong>Descartes</strong> affirme que grâce à la science et à la technique, l'homme peut se rendre <strong>« comme maître et possesseur de la nature »</strong>. Cette vision mécaniste considère la nature comme une <strong>machine</strong> que l'homme peut comprendre et exploiter. Cette posture est aujourd'hui critiquée face à la crise écologique."},
{q:"Qu'appelle-t-on le « droit naturel » en philosophie ?",opts:["Le droit de profiter de la nature","L'ensemble des droits que l'homme possède par nature, avant toute société","Le droit de l'environnement","Les lois de la physique"],correct:1,expl:"Le <strong>droit naturel</strong> (<em>jus naturale</em>) désigne les droits que tout être humain possède <strong>par nature</strong>, indépendamment des lois civiles : droit à la vie, à la liberté, etc. Des penseurs comme <strong>Locke</strong> et <strong>Grotius</strong> ont fondé sur ce concept l'idée de <strong>droits de l'homme universels</strong>. Il s'oppose au <strong>droit positif</strong> (les lois écrites par les sociétés)."},
{q:"Selon Spinoza, qu'est-ce que la nature (Deus sive Natura) ?",opts:["Un jardin créé par Dieu","Dieu lui-même, la substance unique et infinie","Un ensemble d'atomes aléatoires","Une illusion de nos sens"],correct:1,expl:"Pour <strong>Spinoza</strong> (<em>Éthique</em>), <strong>Dieu et la Nature sont une seule et même chose</strong> (<em>Deus sive Natura</em>). La nature n'est pas une création de Dieu : elle <strong>est</strong> Dieu, compris comme substance infinie. C'est une position <strong>panthéiste</strong> et <strong>déterministe</strong> : tout dans la nature suit des lois nécessaires, y compris l'homme."},
{q:"Pourquoi dit-on que l'homme est un « être de culture » plutôt qu'un « être de nature » ?",opts:["Parce que l'homme ne vit pas dans la nature","Parce que l'homme transforme sa nature par l'éducation, le langage et les institutions","Parce que l'homme déteste la nature","Parce que l'homme est artificiel"],correct:1,expl:"L'homme est un <strong>être de culture</strong> car, contrairement à l'animal guidé par l'instinct, il se <strong>construit</strong> à travers l'<strong>éducation</strong>, le <strong>langage</strong>, les <strong>techniques</strong> et les <strong>institutions</strong>. Comme le dit <strong>Merleau-Ponty</strong> : « Tout est fabriqué et tout est naturel chez l'homme. » L'homme n'a pas de nature fixe : il est ce qu'il <strong>devient</strong>."},
{q:"Que critique Hans Jonas dans « Le Principe responsabilité » ?",opts:["La religion","Le progrès technique incontrôlé qui menace la nature et les générations futures","Le manque de travail","Le temps qui passe"],correct:1,expl:"<strong>Hans Jonas</strong> (1979) propose une <strong>éthique de la responsabilité</strong> face au pouvoir technologique moderne. Il formule un nouvel impératif : « Agis de façon que les effets de ton action soient compatibles avec la permanence d'une vie authentiquement humaine sur terre. » C'est un appel à la <strong>prudence</strong> et au <strong>souci des générations futures</strong>, fondateur de l'éthique écologique."},
{q:"Qu'est-ce que la « physis » chez les philosophes grecs présocratiques ?",opts:["La forme physique du corps","Le principe d'émergence et de croissance de toute chose, la nature comme processus","Un type de plante médicinale","La force musculaire"],correct:1,expl:"La <strong>physis</strong> (φύσις) chez les <strong>présocratiques</strong> (Héraclite, Thalès, Anaximandre) désigne le <strong>principe d'émergence</strong> de toute réalité : ce qui fait naître, croître et périr les choses. C'est la nature comprise comme <strong>processus dynamique</strong>, non comme simple décor. Aristote reprendra ce concept : la physis est le principe de mouvement interne à chaque être."},
{q:"Selon le mythe de Prométhée (Platon, Protagoras), pourquoi l'homme a-t-il besoin de la technique ?",opts:["Pour s'amuser","Parce qu'Épiméthée a distribué toutes les qualités naturelles aux animaux, laissant l'homme nu et démuni","Pour dominer les autres espèces par plaisir","Parce que les dieux l'ont ordonné"],correct:1,expl:"Dans le <strong><em>Protagoras</em></strong> de Platon, <strong>Épiméthée</strong> distribue griffes, fourrure et rapidité aux animaux mais <strong>oublie l'homme</strong>. <strong>Prométhée</strong> vole alors le <strong>feu</strong> (la technique) aux dieux pour compenser. Ce mythe illustre que l'homme est un être <strong>naturellement démuni</strong> qui doit <strong>se construire par la technique et la culture</strong> pour survivre."}
]
};

// ═══════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════
let currentQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let answered = false;
let userAnswers = []; // {qObj, selected, isCorrect}

const screenHome    = document.getElementById('screen-home');
const screenQuiz    = document.getElementById('screen-quiz');
const screenResults = document.getElementById('screen-results');

function startTheme(key) {
  if (key === 'all') {
    currentQuestions = [...QUESTIONS.travail, ...QUESTIONS.temps, ...QUESTIONS.nature];
  } else {
    currentQuestions = [...QUESTIONS[key]];
  }
  // Shuffle
  currentQuestions.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  correctCount = 0;
  userAnswers  = [];
  answered     = false;

  screenHome.classList.add('hide');
  screenResults.classList.add('hide');
  screenQuiz.classList.remove('hide');
  renderQuestion();
}

function getThemeLabel(q) {
  if (QUESTIONS.travail.includes(q)) return '⚒️ Le Travail';
  if (QUESTIONS.temps.includes(q)) return '⏳ Le Temps';
  if (QUESTIONS.nature.includes(q)) return '🌿 La Nature';
  return '📚 Philo';
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;
  answered = false;

  document.getElementById('q-counter').textContent = `${currentIndex+1}/${total}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex+1)/total)*100}%`;
  document.getElementById('score-label').textContent = `✅ ${correctCount}`;
  document.getElementById('q-theme-tag').textContent = getThemeLabel(q);
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('explanation-box').classList.add('hide');
  document.getElementById('btn-next').classList.add('hide');

  const letters = ['A','B','C','D'];
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.addEventListener('click', () => selectAnswer(i));
    container.appendChild(btn);
  });

  // Re-animate card
  screenQuiz.style.animation = 'none';
  void screenQuiz.offsetWidth;
  screenQuiz.style.animation = 'fadeIn .5s ease';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIndex];
  const buttons = document.querySelectorAll('.option-btn');
  const isCorrect = idx === q.correct;

  if (isCorrect) correctCount++;

  userAnswers.push({ qObj: q, selected: idx, isCorrect });

  // Visual feedback
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.correct) btn.classList.add('correct');
    if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  // Show explanation
  document.getElementById('expl-text').innerHTML = q.expl;
  document.getElementById('explanation-box').classList.remove('hide');

  // Show next button
  const btnNext = document.getElementById('btn-next');
  btnNext.classList.remove('hide');
  btnNext.textContent = (currentIndex === currentQuestions.length - 1) ? 'Voir les résultats 🏆' : 'Suivant ➡️';

  // Update score
  document.getElementById('score-label').textContent = `✅ ${correctCount}`;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResults();
  } else {
    renderQuestion();
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

function showResults() {
  screenQuiz.classList.add('hide');
  screenResults.classList.remove('hide');

  const total = currentQuestions.length;
  const pct = Math.round((correctCount / total) * 100);

  document.getElementById('r-score').textContent = correctCount;
  document.getElementById('r-total').textContent = `/ ${total}`;

  let msg = '';
  if (pct === 100)     msg = 'Parfait ! Tu es prêt(e) pour le bac ! 🎉';
  else if (pct >= 80)  msg = 'Excellent ! Tu maîtrises bien ces notions 💪';
  else if (pct >= 60)  msg = 'Bien joué ! Encore un peu de révision et ce sera parfait 📖';
  else if (pct >= 40)  msg = 'Pas mal, mais il faut approfondir certaines notions 📚';
  else                 msg = 'Il faut réviser davantage ! Relis tes cours et recommence 💡';
  document.getElementById('r-msg').textContent = msg;

  // Details
  const detailsDiv = document.getElementById('r-details');
  detailsDiv.innerHTML = '';
  userAnswers.forEach((a) => {
    const item = document.createElement('div');
    item.className = 'result-item';
    const icon = a.isCorrect ? '✅' : '❌';
    const letters = ['A','B','C','D'];
    let html = `<span class="result-icon">${icon}</span>`;
    html += `<div class="result-q"><strong>${a.qObj.q}</strong><br>`;
    if (!a.isCorrect) {
      html += `Ta réponse : ${letters[a.selected]}. ${a.qObj.opts[a.selected]}<br>`;
    }
    html += `Bonne réponse : ${letters[a.qObj.correct]}. ${a.qObj.opts[a.qObj.correct]}</div>`;
    item.innerHTML = html;
    detailsDiv.appendChild(item);
  });

  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
